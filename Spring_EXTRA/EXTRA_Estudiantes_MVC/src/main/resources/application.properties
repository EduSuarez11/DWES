spring.application.name=EXTRA_Estudiantes_MVC

server.port=8081

spring.datasource.url=jdbc:h2:mem:estudiantes
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.defer-datasource-initialization=true

# nivel global (root)
logging.level.root=INFO

# nivel por paquete o clase (ejemplo para tu app)
logging.level.es.daw.extra_estudiantesmvc=TRACE
#logging.level.es.daw.extra_estudiantesmvc.service=TRACE

# escribir también a fichero (Spring Boot)
logging.file.name=app.log         # crea app.log en working dir
# o para una ruta
logging.file.path=logs

# cambiar patrón de consola (opcional)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level - %msg%n
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
